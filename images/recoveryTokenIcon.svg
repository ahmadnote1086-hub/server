<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <title>Recovery Token</title>

  <!-- Outer diamond frame (expanded more outward) -->
  <polygon points="250,20 480,250 250,480 20,250"
    fill="none" stroke="#E0F9FC" stroke-width="18"/>

  <!-- Inner diamond frame (also expanded outward, keeping gap from plus) -->
  <polygon points="250,85 415,250 250,415 85,250"
    fill="none" stroke="#E0F9FC" stroke-width="6" opacity="0.4"/>

  <!-- Plus / cross (UNCHANGED as you wanted) -->
  <rect x="210" y="135" width="80" height="230" rx="10" fill="#E0F9FC"/>
  <rect x="135" y="210" width="230" height="80" rx="10" fill="#E0F9FC"/>

  <!-- Corner dots -->
  <circle cx="250" cy="20"  r="12" fill="#E0F9FC"/>
  <circle cx="480" cy="250" r="12" fill="#E0F9FC"/>
  <circle cx="250" cy="480" r="12" fill="#E0F9FC"/>
  <circle cx="20"  cy="250" r="12" fill="#E0F9FC"/>
</svg>